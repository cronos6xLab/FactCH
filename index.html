<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Facturación</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 100%;
      height: 100%;
    }

    body {
      /* sin flex ni centrado para evitar espacios negros mal ubicados */
    }

    .contenedor {
      width: 100vw;   /* ocupa todo el ancho de la pantalla */
      margin: 0;
    }

    /* Imagen responsiva que conserva proporción */
    img[usemap] {
      width: 100%;
      height: auto;
      display: block;
      border: 0;
    }
  </style>
</head>
<body>
  <!-- Mapa de la imagen con tus nuevas coordenadas -->
  <map name="mapa-facturacion">
    <!-- BOTÓN CON TUS NUEVAS COORDS -->
    <area shape="rect"
          coords="721,1425,123,1315"
          href="https://factura.foodbot.ai/fa.html"
          alt="Ir al portal de facturación">
  </map>

  <!-- Imagen principal responsiva -->
  <div class="contenedor">
    <img src="IMG_5260.jpeg"
         usemap="#mapa-facturacion"
         alt="Landing de facturación">
  </div>

  <!-- Librería para hacer el mapa responsivo -->
  <script src="https://cdn.jsdelivr.net/npm/image-map-resizer@1.0.10/js/imageMapResizer.min.js"></script>

  <script>
    // Cuando cargue la página, hacer responsivo el mapa
    window.addEventListener('load', function () {
      if (typeof imageMapResize === 'function') {
        imageMapResize();
      }
    });
  </script>
</body>
</html>
