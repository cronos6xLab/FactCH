<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Facturación</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 100%;
      height: 100%;
    }

    .contenedor {
      position: relative;
      width: 100vw;
      margin: 0;
    }

    img[usemap] {
      width: 100%;
      height: auto;
      display: block;
      border: 0;
    }

    .efecto-hover {
      position: absolute;
      border: 2px solid #4CAF50;
      background-color: rgba(76, 175, 80, 0.3);
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      z-index: 10;
    }

    .efecto-hover.activo {
      opacity: 1;
    }
  </style>
</head>
<body>

  <map name="mapa-facturacion">
    <area shape="rect"
          coords="100,1300,700,1400"
          href="https://factura.foodbot.ai/fa.html"
          alt="Ir al portal de facturación"
          title="Ir al portal de facturación">
  </map>

  <div class="contenedor">
    <img src="https://i.ibb.co/BVmzFtz5/IMG-5262.png"
         usemap="#mapa-facturacion"
         alt="Landing de facturación">
  </div>

  <script>
    // Coordenadas originales de la imagen completa (2160x3840)
    const originalWidth = 2160;
    const originalHeight = 3840;
    const originalCoords = [100, 1300, 700, 1400];

    function updateCoords() {
      const img = document.querySelector('img[usemap]');
      if (!img.naturalWidth) return;

      const scaleX = img.clientWidth / originalWidth;
      const scaleY = img.clientHeight / originalHeight;

      const newCoords = [
        Math.round(originalCoords[0] * scaleX),
        Math.round(originalCoords[1] * scaleY),
        Math.round(originalCoords[2] * scaleX),
        Math.round(originalCoords[3] * scaleY)
      ].join(',');

      const area = document.querySelector('area');
      area.coords = newCoords;
    }

    window.addEventListener('load', function () {
      // Esperar a que la imagen cargue
      const img = document.querySelector('img[usemap]');
      img.onload = updateCoords;

      // Actualizar en resize
      window.addEventListener('resize', updateCoords);

      // Efecto hover
      const recuadro = document.createElement('div');
      recuadro.className = 'efecto-hover';
      document.querySelector('.contenedor').appendChild(recuadro);

      const areas = document.querySelectorAll('area');
      areas.forEach(area => {
        area.addEventListener('mouseenter', function() {
          const coords = this.coords.split(',');
          const x1 = parseInt(coords[0], 10);
          const y1 = parseInt(coords[1], 10);
          const x2 = parseInt(coords[2], 10);
          const y2 = parseInt(coords[3], 10);

          recuadro.style.left = x1 + 'px';
          recuadro.style.top = y1 + 'px';
          recuadro.style.width = (x2 - x1) + 'px';
          recuadro.style.height = (y2 - y1) + 'px';
          recuadro.classList.add('activo');
        });

        area.addEventListener('mouseleave', function() {
          recuadro.classList.remove('activo');
        });
      });

      // Inicializar coordenadas
      setTimeout(updateCoords, 100);
    });
  </script>
</body>
</html>
