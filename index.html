<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Facturación</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 100%;
      height: 100%;
    }

    /* Posición relativa obligatoria para que el recuadro visual se ubique bien */
    .contenedor {
      position: relative; 
      width: 100vw;
      margin: 0;
    }

    img[usemap] {
      width: 100%;
      height: auto;
      display: block;
      border: 0;
    }

    /* --- NUEVO: ESTILOS DEL EFECTO VISUAL --- */
    .efecto-hover {
      position: absolute;
      border: 2px solid #4CAF50; /* Borde verde */
      background-color: rgba(76, 175, 80, 0.3); /* Fondo verde semitransparente */
      border-radius: 8px; /* Bordes ligeramente redondeados */
      pointer-events: none; /* Crucial: permite que el clic traspase el recuadro hacia el mapa */
      opacity: 0; /* Oculto por defecto */
      transition: opacity 0.2s ease-in-out;
      z-index: 10;
    }
    
    .efecto-hover.activo {
      opacity: 1; /* Se muestra al pasar el ratón */
    }
  </style>
</head>
<body>

  <map name="mapa-facturacion">
    <area shape="rect"
          coords="123,1315,721,1425"
          href="https://factura.foodbot.ai/fa.html"
          alt="Ir al portal de facturación">
  </map>

  <div class="contenedor">
    <img src="https://i.ibb.co/BVmzFtz5/IMG-5262.png"
         usemap="#mapa-facturacion"
         alt="Landing de facturación">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/image-map-resizer@1.0.10/js/imageMapResizer.min.js"></script>

  <script>
    window.addEventListener('load', function () {
      // 1. Inicializar mapa responsivo
      if (typeof imageMapResize === 'function') {
        imageMapResize();
      }

      // 2. NUEVO: Lógica para el efecto visual
      // Creamos el recuadro y lo metemos al contenedor
      const recuadro = document.createElement('div');
      recuadro.className = 'efecto-hover';
      document.querySelector('.contenedor').appendChild(recuadro);

      const areas = document.querySelectorAll('area');

      areas.forEach(area => {
        // Al poner el ratón sobre el botón
        area.addEventListener('mouseenter', function() {
          // Leemos las coordenadas actuales (la librería las actualiza en móviles)
          const coords = this.getAttribute('coords').split(',');
          const x1 = parseInt(coords[0], 10);
          const y1 = parseInt(coords[1], 10);
          const x2 = parseInt(coords[2], 10);
          const y2 = parseInt(coords[3], 10);

          // Posicionamos el recuadro calculando su ancho y alto
          recuadro.style.left = x1 + 'px';
          recuadro.style.top = y1 + 'px';
          recuadro.style.width = (x2 - x1) + 'px';
          recuadro.style.height = (y2 - y1) + 'px';
          
          recuadro.classList.add('activo');
        });

        // Al quitar el ratón del botón
        area.addEventListener('mouseleave', function() {
          recuadro.classList.remove('activo');
        });
      });
    });
  </script>
</body>
</html>
