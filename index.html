<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Facturación</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 100%;
      height: 100%;
    }

    .contenedor {
      position: relative; /* necesario para que el botón se posicione sobre la imagen */
      width: 100%;
      margin: 0;
      line-height: 0; /* evita espacio extra debajo de la imagen */
    }

    .contenedor img {
      width: 100%;
      height: auto;
      display: block;
      border: 0;
    }

    /* Botón invisible posicionado sobre la imagen */
    .btn-overlay {
      position: absolute;
      /* Ajusta estos % según dónde esté el botón en tu imagen */
      /* left/width = coordenadas X / ancho original de imagen */
      /* top/height = coordenadas Y / alto original de imagen  */
      left: 12.5%;    /* 100 / 800 */
      top: 86.7%;     /* 1300 / 1500 */
      width: 75%;     /* (700-100) / 800 */
      height: 6.7%;   /* (1400-1300) / 1500 */
      cursor: pointer;
      text-decoration: none;
      border-radius: 8px;
      border: 2px solid transparent;
      background: transparent;
      transition: background 0.2s ease, border-color 0.2s ease;
      display: block;
      z-index: 10;
    }

    .btn-overlay:hover {
      background: rgba(76, 175, 80, 0.3);
      border-color: #4CAF50;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <img src="https://i.ibb.co/BVmzFtz5/IMG-5262.png"
         alt="Landing de facturación">

    <!-- Botón overlay posicionado con % sobre la imagen -->
    <a class="btn-overlay"
       href="https://factura.foodbot.ai/fa.html"
       aria-label="Ir al portal de facturación"></a>
  </div>

</body>
</html>
