<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Facturación</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 100%;
      height: 100%;
    }

    .contenedor {
      position: relative;
      width: 100vw;
      margin: 0;
    }

    img[usemap] {
      width: 100%;
      height: auto;
      display: block;
      border: 0;
    }

    .debug-overlay {
      position: absolute;
      background-color: rgba(255, 0, 0, 0.4);
      border: 3px solid red;
      pointer-events: none;
      z-index: 20;
    }
  </style>
</head>
<body>

  <map name="mapa-facturacion">
    <area shape="rect"
          coords="100,1300,700,1400"
          href="https://factura.foodbot.ai/fa.html"
          alt="Ir al portal de facturación"
          title="Ir al portal de facturación">
  </map>

  <div class="contenedor">
    <img src="https://i.ibb.co/BVmzFtz5/IMG-5262.png"
         usemap="#mapa-facturacion"
         alt="Landing de facturación">
  </div>

  <script>
    window.addEventListener('load', function () {
      const areas = document.querySelectorAll('area');
      const contenedor = document.querySelector('.contenedor');

      areas.forEach(area => {
        const coords = area.getAttribute('coords').split(',');
        const x1 = parseInt(coords[0], 10);
        const y1 = parseInt(coords[1], 10);
        const x2 = parseInt(coords[2], 10);
        const y2 = parseInt(coords[3], 10);

        const overlay = document.createElement('div');
        overlay.className = 'debug-overlay';
        overlay.style.left  = x1 + 'px';
        overlay.style.top   = y1 + 'px';
        overlay.style.width = (x2 - x1) + 'px';
        overlay.style.height = (y2 - y1) + 'px';

        contenedor.appendChild(overlay);
      });
    });
  </script>
</body>
</html>
