<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Facturación</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 100%;
      height: 100%;
    }

    .contenedor {
      position: relative;
      width: 100vw;
      margin: 0;
    }

    img[usemap] {
      width: 100%;
      height: auto;
      display: block;
      border: 0;
    }

    /* Efecto visual (cuadro verde al pasar el ratón) */
    .efecto-hover {
      position: absolute;
      border: 2px solid #4CAF50;
      background-color: rgba(76, 175, 80, 0.3);
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      z-index: 10;
    }

    .efecto-hover.activo {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Mapa generado por image-map.net -->
  <map name="image-map">
    <area shape="rect"
          coords="127,1314,724,1426"
          href="https://factura.foodbot.ai/fa.html"
          alt="Ir al portal de facturación"
          title="Ir al portal de facturación">
  </map>

  <div class="contenedor">
    <!-- Asegúrate de que esta sea la misma imagen en dimensiones que usaste en image-map.net -->
    <img src="IMG_5260.jpeg"
         usemap="#image-map"
         alt="Landing de facturación">
  </div>

  <!-- Script para hacer el mapa responsive -->
  <script src="https://cdn.jsdelivr.net/npm/image-map-resizer@1.0.10/js/imageMapResizer.min.js"></script>

  <script>
    window.addEventListener('load', function () {
      // 1. Inicializar mapa responsivo
      if (typeof imageMapResize === 'function') {
        imageMapResize();
      }

      // 2. Efecto visual (recuadro)
      const recuadro = document.createElement('div');
      recuadro.className = 'efecto-hover';
      document.querySelector('.contenedor').appendChild(recuadro);

      const areas = document.querySelectorAll('area');

      areas.forEach(area => {
        area.addEventListener('mouseenter', function() {
          const coords = this.getAttribute('coords').split(',');
          const x1 = parseInt(coords[0], 10);
          const y1 = parseInt(coords[1], 10);
          const x2 = parseInt(coords[2], 10);
          const y2 = parseInt(coords[3], 10);

          recuadro.style.left = x1 + 'px';
          recuadro.style.top = y1 + 'px';
          recuadro.style.width = (x2 - x1) + 'px';
          recuadro.style.height = (y2 - y1) + 'px';
          
          recuadro.classList.add('activo');
        });

        area.addEventListener('mouseleave', function() {
          recuadro.classList.remove('activo');
        });
      });
    });
  </script>
</body>
</html>
