<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Facturación</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 100%;
      height: 100%;
    }

    .contenedor {
      position: relative;
      width: 100%;
      margin: 0;
      line-height: 0;
    }

    .contenedor img {
      width: 100%;
      height: auto;
      display: block;
      border: 0;
    }

    .btn-overlay {
      position: absolute;
      left: 10.74%;
      top: 57.25%;
      width: 43.34%;
      height: 5.20%;
      cursor: pointer;
      text-decoration: none;
      border: none;
      background: transparent;
      display: block;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <img src="https://i.ibb.co/BVmzFtz5/IMG-5262.png"
         alt="Landing de facturación">

    <a class="btn-overlay"
       href="https://factura.foodbot.ai/fa.html"
       aria-label="Ir al portal de facturación"></a>
  </div>

</body>
</html>
